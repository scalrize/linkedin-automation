name: LinkedIn Weekly Post Generator

on:
  schedule:
    - cron: '0 0 * * 1'   # Monday 00:00 UTC = 08:00 AM Bali time
  workflow_dispatch:        # Manual trigger for testing

permissions:
  contents: write

jobs:
  generate-and-send:
    name: Generate posts & send email
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LinkedIn automation pipeline
        id: pipeline
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GMAIL_TOKEN:       ${{ secrets.GMAIL_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python main.py

      - name: Commit updated post_log.txt
        if: steps.pipeline.outcome == 'success'
        continue-on-error: true
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add post_log.txt
          git diff --staged --quiet && echo "No changes to post_log.txt" && exit 0
          git commit -m "Auto: update post_log.txt — $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send failure notification email
        if: steps.pipeline.outcome == 'failure'
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          python -c "
          try:
              from send_email import send_failure_email
              send_failure_email(
                  'The LinkedIn automation pipeline failed this week.\n\n'
                  'Check the Actions log:\n'
                  'https://github.com/scalrize/linkedin-automation/actions\n\n'
                  'Please generate your posts manually this week.'
              )
          except Exception as e:
              print(f'Could not send failure notification: {e}')
          "
