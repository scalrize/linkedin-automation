name: LinkedIn Weekly Post Generator

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-send:
    name: Generate posts & send email
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LinkedIn automation pipeline
        id: pipeline
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GMAIL_TOKEN:       ${{ secrets.GMAIL_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python main.py

      - name: Send failure notification email
        if: steps.pipeline.outcome == 'failure'
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          python -c "
          try:
              from send_email import send_failure_email
              send_failure_email('Pipeline failed. Check Actions log.')
          except Exception as e:
              print(f'Could not send: {e}')
          "
